# Deploy mudah di VPS:
#   1. python build_website.py   (di host, butuh .env)
#   2. docker compose up -d --build
# Situs di http://<ip-vps>:8080
#
# Ganti "8080:80" -> "80:80" kalau mau langsung di port 80.

services:
  web:
    build: .
    image: mci-oprec:latest
    container_name: mci-oprec
    ports:
      - "8080:80"
    restart: unless-stopped
